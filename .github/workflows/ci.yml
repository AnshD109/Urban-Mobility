name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic scikit-learn joblib numpy pandas pytest httpx

      - name: Generate synthetic data and models
        run: |
          python scripts/make_telematics_data.py
          python scripts/make_nlp_data.py
          python -c "
          import subprocess, sys
          # Train minimal models for CI
          from pathlib import Path
          import joblib, numpy as np
          from sklearn.ensemble import RandomForestRegressor, IsolationForest, RandomForestClassifier
          from sklearn.linear_model import QuantileRegressor
          from sklearn.preprocessing import StandardScaler
          from sklearn.feature_extraction.text import TfidfVectorizer
          from sklearn.linear_model import LogisticRegression
          from sklearn.pipeline import Pipeline
          import pandas as pd

          Path('models').mkdir(exist_ok=True)
          Path('data/processed').mkdir(parents=True, exist_ok=True)

          FEATURES = ['trip_distance','hour_sin','hour_cos','dow_sin','dow_cos','month',
                      'is_weekend','is_rush_hour','temp','prcp','wspd','is_rainy','is_windy',
                      'rain_x_dist','wind_x_dist','pu_zone_enc','do_zone_enc','pu_borough_enc','route_enc']
          n = 500
          rng = np.random.default_rng(42)
          X = rng.normal(size=(n, len(FEATURES)))
          y = rng.uniform(5, 60, n)

          rf = RandomForestRegressor(n_estimators=10, random_state=42)
          rf.fit(X, y)
          joblib.dump({'model': rf, 'features': FEATURES}, 'models/eta_rf.joblib')

          sc = StandardScaler(); X_s = sc.fit_transform(X)
          qms = {}
          for q in [0.1, 0.5, 0.9]:
              qr = QuantileRegressor(quantile=q, alpha=0.01, solver='highs')
              qr.fit(X_s, y)
              qms[q] = qr
          joblib.dump({'models': qms, 'scaler': sc, 'features': FEATURES}, 'models/eta_quantile.joblib')
          joblib.dump({'model': None, 'scaler': sc, 'features': FEATURES}, 'models/eta_lr.joblib')
          joblib.dump({'features': FEATURES, 'target': 'eta_min', 'global_mean': float(y.mean()),
                       'pu_enc': {}, 'do_enc': {}, 'borough_enc': {}, 'route_enc': {}},
                      'models/feature_pipeline.joblib')
          joblib.dump({'surge_config': {'rush_hour':1.3,'rain':1.15,'snow':1.25,
                       'weekend_evening':1.1,'surge_min':1.0,'surge_max':2.5},
                       'base_rate': 2.5, 'base_minimum': 5.0}, 'models/pricing_config.joblib')

          tel = pd.read_csv('data/raw/telematics.csv')
          TEL_FEATS = ['odometer_km','avg_speed_kmh','max_speed_kmh','engine_temp_mean_c',
                       'engine_temp_max_c','battery_voltage_mean','battery_voltage_min',
                       'vibration_mean_ms2','vibration_max_ms2','brake_pressure_mean',
                       'hard_brakes_count','idle_hours','trips_count']
          X_t = tel[TEL_FEATS].values; y_t = tel['failure_label'].values
          sc_t = StandardScaler(); X_ts = sc_t.fit_transform(X_t)
          iso = IsolationForest(n_estimators=10, random_state=42); iso.fit(X_ts[y_t==0])
          rf_t = RandomForestClassifier(n_estimators=10, random_state=42); rf_t.fit(X_ts, y_t)
          joblib.dump({'model': iso, 'scaler': sc_t, 'features': TEL_FEATS}, 'models/maintenance_iso.joblib')
          joblib.dump({'model': rf_t, 'scaler': sc_t, 'features': TEL_FEATS}, 'models/maintenance_rf.joblib')

          nlp = pd.read_csv('data/raw/nlp_incidents.csv')
          pipe = Pipeline([('tfidf', TfidfVectorizer(max_features=500)),
                           ('clf', LogisticRegression(max_iter=200, random_state=42))])
          pipe.fit(nlp['text'], nlp['label'])
          joblib.dump({'pipeline': pipe, 'label_names': ['delay','damage','wrong_order','driver_conduct','positive']},
                      'models/nlp_pipeline.joblib')
          print('CI models ready')
          "

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install flake8
      - run: flake8 services/ scripts/ monitoring/ --max-line-length=110 --ignore=E501,W503
